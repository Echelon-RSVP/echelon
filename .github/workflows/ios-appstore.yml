# FREE iOS build from Windows: push to GitHub, click Run workflow.
# Needs 5 secrets + Admin API key. See store-listing/IOS-DEPLOY-METHOD.md

name: iOS App Store build

on:
  workflow_dispatch:

concurrency:
  group: ios-appstore-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web + App Store meta
        run: npm run build && npm run ios:prepare

      - name: Capacitor iOS sync
        run: npm run cap:sync:ios

      - name: Patch iOS project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          node scripts/patch-ios-plist.mjs
          node scripts/patch-ios-icon.mjs
          node scripts/patch-ios-signing.mjs

      - name: Install CocoaPods
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -eo pipefail
          cd ios/App
          pod install
          node ../../scripts/patch-pods-signing.mjs

      - name: Validate signing secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          set -eo pipefail
          missing=0
          for name in APPLE_TEAM_ID APPSTORE_KEY_ID APPSTORE_ISSUER_ID APPSTORE_PRIVATE_KEY; do
            eval "val=\$$name"
            if [ -z "$val" ]; then
              echo "::error::$name is empty. Add org/repo secret and grant this repository access."
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          if [ "${#APPLE_TEAM_ID}" -ne 10 ]; then
            echo "::warning::APPLE_TEAM_ID length is ${#APPLE_TEAM_ID} (expected 10)"
          fi
          if ! printf '%s' "$APPSTORE_PRIVATE_KEY" | grep -q "BEGIN PRIVATE KEY"; then
            echo "::error::APPSTORE_PRIVATE_KEY must include -----BEGIN PRIVATE KEY----- header"
            exit 1
          fi
          echo "Signing secrets present."

      - name: Configure App Store Connect API key
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          set -eo pipefail
          KEY_DIR="$RUNNER_TEMP/appstore_key"
          mkdir -p "$KEY_DIR"
          KEY_FILE="$KEY_DIR/AuthKey_${APPSTORE_KEY_ID}.p8"
          printf '%s' "$APPSTORE_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          if ! openssl pkcs8 -in "$KEY_FILE" -nocrypt -topk8 -out /dev/null 2>/dev/null; then
            echo "::error::APPSTORE_PRIVATE_KEY is not a valid .p8 key (check newlines in the GitHub secret)"
            exit 1
          fi
          echo "API_KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"
          echo "App Store Connect API key configured at $KEY_FILE"

      - name: Register iOS device (required for automatic signing)
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          CI_DEVICE_UDID: ${{ secrets.CI_DEVICE_UDID }}
          CI_DEVICE_NAME: Echelon iPhone
        run: node scripts/register-asc-device.mjs

      - name: Verify Xcode scheme
        run: |
          set -eo pipefail
          cd ios/App
          xcodebuild -workspace App.xcworkspace -list
          test -f App.xcodeproj/xcshareddata/xcschemes/App.xcscheme

      - name: Build archive (automatic signing)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEYPATH: ${{ env.API_KEY_PATH }}
        run: |
          set -eo pipefail
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Echelon.xcarchive" archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APPSTORE_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-archive.log"
          if [ ! -d "$RUNNER_TEMP/Echelon.xcarchive/Products/Applications/App.app" ]; then
            echo "::error::Archive was not created"
            grep -iE "error:|failed|provisioning|signing|authentication" "$RUNNER_TEMP/xcodebuild-archive.log" | tail -30 || tail -30 "$RUNNER_TEMP/xcodebuild-archive.log"
            exit 1
          fi

      - name: Export IPA (Admin API key + cloud signing)
        id: export-ipa
        if: success()
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEYPATH: ${{ env.API_KEY_PATH }}
        run: |
          set -eo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Echelon.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APPSTORE_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-export.log"
          test -f "$RUNNER_TEMP/export/App.ipa"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ runner.temp }}/export/App.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Upload IPA artifact
        if: steps.export-ipa.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: echelon-ios-ipa
          path: ${{ runner.temp }}/export/App.ipa
          retention-days: 14

      - name: Upload xcodebuild logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: |
            ${{ runner.temp }}/xcodebuild-archive.log
            ${{ runner.temp }}/xcodebuild-export.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Summarize xcodebuild errors
        if: failure()
        run: |
          for log in "$RUNNER_TEMP/xcodebuild-archive.log" "$RUNNER_TEMP/xcodebuild-export.log"; do
            if [ -f "$log" ]; then
              echo "## $(basename "$log")" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              grep -iE "error:|failed|signing|scheme|provisioning" "$log" | tail -40 >> "$GITHUB_STEP_SUMMARY" || tail -40 "$log" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          done
